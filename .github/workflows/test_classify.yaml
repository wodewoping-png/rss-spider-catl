name: Test Classify Only (GPT-4o-mini)

on:
  workflow_dispatch: {}
  # 可选：你也可以加定时测试
  # schedule:
  #   - cron: "10 3 * * 5"

permissions:
  contents: write

concurrency:
  group: rss-classify-only
  cancel-in-progress: false

jobs:
  classify-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run classify-only test (GPT-4o-mini)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          OPENAI_TEMPERATURE: "0"
          OPENAI_MAX_RETRIES: "3"
          CLASSIFY_BATCH_SIZE: "12"
          CLASSIFY_TEXT_MAX_CHARS: "1200"
          DEBUG_DUMP_DIR: "output/debug"
        run: |
          # 默认自动挑 output/weekly 里最新的 weekly_news_with_abstract_*.csv
          python3 test_classify_only.py -c classification.txt

      - name: Commit outputs (xlsx+docx+debug)
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 只提交本次 classify-only 产物 + debug
          git add output/weekly/*_classify_only.xlsx || true
          git add output/weekly/*_classify_only.docx || true
          git add output/debug/* || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "test: classify-only xlsx+docx (gpt-4o-mini, UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
