name: RSS Spider + Weekly Aggregate with Abstracts

on:
  schedule:
    - cron: "0 2 * * *"    # 每天 UTC 02:00 跑日抓取
    - cron: "50 2 * * 5"   # 每周五 UTC 02:50 跑周汇总（错开50分钟）
  workflow_dispatch:

permissions:
  contents: write   # 允许 Actions push

concurrency:
  group: rss-spider-main
  cancel-in-progress: false

jobs:
  run-rss-spider:
    # 每天 02:00 的 cron 或手动触发都跑
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Print UTC time
        run: date -u

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (Chromium)
        run: python -m playwright install --with-deps chromium

      - name: Run spider (headless)
        run: python spider_abstract_1216.py
        env:
          PLAYWRIGHT_HEADLESS: "1"

      - name: Commit daily results (rebase-safe)
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: daily RSS results (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main

  run-weekly-aggregate-with-abs:
    # 每周一 02:50 的 cron 或手动触发都跑
    if: github.event.schedule == '50 2 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Print UTC time
        run: date -u

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      # 如果 weekly 里也可能用到 playwright（比如你周汇总也想补摘要），保留安装最省心
      - name: Install Playwright browsers (Chromium)
        run: python -m playwright install --with-deps chromium

      - name: Weekly aggregate with abstracts (UTC)
        run: python weekly_aggrerate_with_abs.py
        env:
          PLAYWRIGHT_HEADLESS: "1"

      - name: Commit weekly results (rebase-safe)
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/weekly/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: weekly RSS aggregate with abstracts (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
